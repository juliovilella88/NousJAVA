<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de alunos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <h1>Lista de alunos</h1>
    <nav>
        <a th:href="@{/educador/dashboard}">Dashboard</a>
        <form th:action="@{/logout}" method="post" style="display:inline; margin:0;">
            <button type="submit">Sair</button>
        </form>
    </nav>
</header>
<main>
    <div class="card">
        <table>
            <tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Ação</th></tr>
            <tr th:each="aluno : ${alunos}">
                <td th:text="${aluno.nmUsuario}"></td>
                <td th:text="${aluno.dsEmail}"></td>
                <td th:text="${aluno.role}"></td>
                <td><a class="btn" th:href="@{'/educador/alunos/' + ${aluno.idUsuario}}">Abrir</a></td>
            </tr>
        </table>
    </div>
</main>
</body>
</html>
