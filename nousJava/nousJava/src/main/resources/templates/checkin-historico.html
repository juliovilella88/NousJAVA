<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Histórico de check-ins</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<main>
    <div class="card">
        <h2>Histórico de check-ins</h2>

        <table>
            <tr>
                <th>Data</th>
                <th>Humor</th>
                <th>Comentário</th>
            </tr>

            <tr th:each="item : ${historico}">
                <td th:text="${item.dtCheckin}"></td>
                <td th:text="${item.nrHumor}"></td>
                <td th:text="${item.dsComentario}"></td>
            </tr>

            <tr th:if="${#lists.isEmpty(historico)}">
                <td colspan="3">Nenhum check-in encontrado.</td>
            </tr>
        </table>
    </div>
</main>

</body>
</html>
